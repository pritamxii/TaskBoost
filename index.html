<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Task Master 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #FDFDFD;
            --primary: #B2AC88;
            --text: #333;
            --today-border: #FF5252;
            --past-day: #E6E6FA;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .splash-logo svg { width: 40px; height: 40px; }

        .splash-text {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: #B2AC88;
            letter-spacing: -0.5px;
        }

        .progress-container {
            width: 140px;
            height: 3px;
            background: #F0F0F0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #B2AC88;
            transition: width 1.5s ease-in-out;
        }

        .fade-out { opacity: 0; pointer-events: none; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 8px; color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); text-align: center; }
        .achievement-container { background: white; border-radius: 15px; padding: 12px; border: 1px solid #F0F0F0; margin-bottom: 5px; }
        .ach-title { font-size: 13px; font-weight: 800; color: #B2AC88; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-section { background: #fcfcfc; padding: 8px; border-radius: 10px; border: 1px solid #f8f8f8; }
        .ach-label { font-size: 10px; font-weight: bold; color: #AAA; margin-bottom: 3px; text-transform: uppercase; }
        .ach-value { font-size: 14px; font-weight: 800; color: #555; margin-bottom: 5px; }
        .medal-badge { font-size: 11px; font-weight: bold; padding: 3px 6px; border-radius: 20px; background: #EEE; color: #999; display: inline-block; }
        .medal-badge.active { background: #FFF9C4; color: #856404; border: 1px solid #FFEBA1; }
        
        .calendar-nav { display: flex; overflow-x: auto; gap: 6px; padding: 15px 0 5px 0; scrollbar-width: none; }
        .calendar-nav::-webkit-scrollbar { display: none; }
        .day-pill { 
            min-width: 45px; padding: 8px 4px; background: #fff; border-radius: 10px; border: 1px solid #F0F0F0;
            cursor: pointer; text-align: center; flex-shrink: 0; transition: 0.2s; position: relative;
        }
        .day-pill.is-today { border: 2px solid var(--today-border); }
        .day-pill.is-today::after { 
            content: 'TODAY'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); 
            font-size: 7px; background: var(--today-border); color: white; padding: 1px 4px; border-radius: 3px; font-weight: bold;
        }
        .day-pill.active { background: #FFF9C4 !important; border-color: #FFEB3B; }
        .day-pill.is-past { background: var(--past-day); }
        .day-pill .date-num { font-size: 16px; font-weight: 800; display: block; }

        .habit-container { border-radius: 15px; overflow: hidden; border: 1px solid #F0F0F0; margin-top: 5px; }
        .habit-header { background: #fff; padding: 12px; text-align: left; font-size: 16px; font-weight: 800; color: #444; border-bottom: 1px solid #F8F8F8; }
        .habit-row { display: flex; align-items: stretch; border-bottom: 1px solid #F8F8F8; min-height: 55px; }
        .habit-label { flex: 1; padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 700; }
        
        .task-content { display: flex; align-items: baseline; gap: 8px; }
        .task-time { font-size: 11px; opacity: 0.6; font-weight: 400; }

        .row-0 { background-color: #E8F5E9; color: #2E7D32; }
        .row-1 { background-color: #F1F3E9; color: #556B2F; }
        .row-2 { background-color: #E3F2FD; color: #1565C0; }
        .row-3 { background-color: #F3E5F5; color: #6A1B9A; }
        .row-4 { background-color: #FAF3E0; color: #8D6E63; }

        .habit-check-area { width: 60px; display: flex; align-items: center; justify-content: center; background: #FFF9C4; border-left: 1px solid #F0F0F0; }
        .custom-checkbox { width: 26px; height: 26px; border: 2px solid #CCC; border-radius: 6px; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .custom-checkbox.checked { background: #BA68C8; border-color: #BA68C8; color: white; }
        .custom-checkbox.checked::after { content: '✓'; font-weight: bold; font-size: 16px; }
        .delete-btn { font-size: 12px; opacity: 0.3; padding: 5px; cursor: pointer; }

        .chart-container { height: 180px; width: 100%; }
        .input-group { display: flex; gap: 8px; margin: 5px 0; }
        .input-group input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #EEE; outline: none; font-size: 14px; }
        .input-group button { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        
        .dev-sig { text-align: center; font-size: 10px; color: #E6E6FA; opacity: 0.6; margin-top: 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">
        <svg viewBox="0 0 24 24" fill="#689F38">
            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,11 17,8 17,8Z" />
        </svg>
        <span class="splash-text">Habit Master Pro</span>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="load-bar"></div>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 5px 10px;">
        <h3 style="margin:0; color:var(--primary); font-size: 17px;">Task Master</h3>
        <div style="display: flex; gap: 5px;">
            <select id="monthSelect" onchange="initCalendar()" style="border:none; font-weight:bold; background:none; font-size: 13px; text-align: right;">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
            <select id="yearSelect" onchange="initCalendar()" style="border:none; font-weight:bold; background:none; font-size: 13px;"></select>
        </div>
    </div>

    <div class="achievement-container">
        <div class="ach-title">🏆 ACHIEVEMENT BOX 🏆</div>
        <div class="ach-grid">
            <div class="ach-section">
                <div class="ach-label">Daily Progress</div>
                <div id="dailyPercentText" class="ach-value">0%</div>
                <div id="dailyMedal" class="medal-badge">No Medal</div>
            </div>
            <div class="ach-section">
                <div class="ach-label">Month Progress</div>
                <div id="monthlyPercentText" class="ach-value">0%</div>
                <div id="monthlyMedal" class="medal-badge">No Rank</div>
            </div>
        </div>
    </div>

    <div class="calendar-nav" id="datePicker"></div>

    <div class="card">
        <div style="text-align:left; font-weight:bold; color:#AAA; font-size:10px; margin-bottom:8px;">MONTHLY ANALYSIS</div>
        <div class="chart-container">
            <canvas id="habitChart"></canvas>
        </div>
    </div>

    <div class="habit-container">
        <div class="habit-header" id="listTitle">DAILY TASKS</div>
        <div id="habitList"></div>
    </div>

    <div class="input-group">
        <input type="text" id="habitInput" placeholder="New task...">
        <button onclick="addHabit()">ADD</button>
    </div>

    <div class="card" style="text-align:left; padding: 10px;">
        <div style="font-weight:800; color:#AAA; font-size:10px;">DAILY JOURNAL</div>
        <textarea id="dayNote" style="width:100%; border:none; margin-top:5px; font-size:14px; outline:none; min-height: 50px;" placeholder="How was your day?" oninput="saveNote()"></textarea>
    </div>

    <div style="display:flex; gap:8px; justify-content:center; margin-bottom: 5px;">
        <button onclick="openExport()" style="padding:8px 15px; border-radius:8px; border:1px solid #EEE; background:white; font-size:11px;">Backup</button>
        <button onclick="openRestore()" style="padding:8px 15px; border-radius:8px; border:1px solid #EEE; background:white; font-size:11px;">Restore</button>
    </div>

    <div class="dev-sig">Developed by pritam</div>
</div>

<div id="dataModal" class="modal"><div class="modal-content">
    <h4 id="modalTitle">Data</h4>
    <textarea id="dataArea" style="width:100%; height:100px; margin-bottom:10px; padding:10px;"></textarea>
    <button onclick="processData()" id="modalBtn" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">Action</button>
    <p onclick="closeModal()" style="margin-top:10px; cursor:pointer; color:#AAA; font-size:11px;">Cancel</p>
</div></div>

<script>
    let allData = JSON.parse(localStorage.getItem('HabitPro_Daily_Mode')) || {};
    let notesData = JSON.parse(localStorage.getItem('HabitPro_Notes_Daily')) || {};
    
    const todayObj = new Date();
    const realToday = todayObj.getDate();
    const realMonth = todayObj.getMonth();
    const realYear = todayObj.getFullYear();
    
    let selectedDay = realToday;
    let selectedMonth = "";
    let selectedYear = realYear;
    
    const monthsArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    let myChart;

    window.onload = function() {
        const yearSelect = document.getElementById('yearSelect');
        for(let y = realYear - 2; y <= realYear + 5; y++) {
            let opt = document.createElement('option');
            opt.value = y;
            opt.innerHTML = y;
            if(y === realYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        document.getElementById('load-bar').style.width = '100%';
        selectedMonth = monthsArr[realMonth];
        document.getElementById('monthSelect').value = selectedMonth;
        initChart();
        initCalendar();

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
        }, 1800);
    };

    function initCalendar() {
        selectedMonth = document.getElementById('monthSelect').value;
        selectedYear = parseInt(document.getElementById('yearSelect').value);
        const picker = document.getElementById('datePicker');
        picker.innerHTML = '';
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
            const dateObj = new Date(selectedYear, monthsArr.indexOf(selectedMonth), i);
            const isToday = (i === realToday && selectedMonth === monthsArr[realMonth] && selectedYear === realYear);
            const isPast = (dateObj < new Date(realYear, realMonth, realToday)); 
            
            const pill = document.createElement('div');
            pill.className = `day-pill ${i === selectedDay ? 'active' : ''} ${isToday ? 'is-today' : ''} ${isPast && !isToday ? 'is-past' : ''}`;
            pill.innerHTML = `<span style="font-size:9px; color:#AAA;">${dayNames[dateObj.getDay()]}</span><span class="date-num">${i}</span>`;
            pill.onclick = () => { selectedDay = i; updateUI(); };
            picker.appendChild(pill);
            if(i === selectedDay) pill.scrollIntoView({ inline: 'center', behavior: 'smooth' });
        }
        updateUI();
    }

    function calculateAchievements() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        const doneCount = habits.filter(h => h.done).length;
        const dailyPercent = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
        document.getElementById('dailyPercentText').innerText = dailyPercent + "%";
        
        let dailyMedal = "No Medal";
        if(dailyPercent >= 90) dailyMedal = "🥇 GOLD";
        else if(dailyPercent >= 80) dailyMedal = "🥈 SILVER";
        else if(dailyPercent >= 60) dailyMedal = "🥉 COPPER";
        
        const dBadge = document.getElementById('dailyMedal');
        dBadge.innerText = dailyMedal;
        dBadge.className = dailyPercent >= 60 ? 'medal-badge active' : 'medal-badge';

        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let totalPercent = 0;
        let trackedDays = 0;
        for(let i=1; i<=daysInMonth; i++) {
            const mKey = `${selectedYear}_${selectedMonth}_${i}`;
            const mHabits = allData[mKey] || [];
            if(mHabits.length > 0) {
                const mDone = mHabits.filter(h => h.done).length;
                totalPercent += (mDone / mHabits.length) * 100;
                trackedDays++;
            }
        }
        const avgMonthly = trackedDays ? Math.round(totalPercent / trackedDays) : 0;
        document.getElementById('monthlyPercentText').innerText = avgMonthly + "%";
        
        let monthlyMedal = "No Rank";
        if(avgMonthly >= 90) monthlyMedal = "👑 CHAMP";
        else if(avgMonthly >= 80) monthlyMedal = "🥈 SILVER";
        else if(avgMonthly >= 60) monthlyMedal = "🥉 COPPER";

        const mBadge = document.getElementById('monthlyMedal');
        mBadge.innerText = monthlyMedal;
        mBadge.className = avgMonthly >= 60 ? 'medal-badge active' : 'medal-badge';
    }

    function updateUI() {
        document.querySelectorAll('.day-pill').forEach((p, idx) => {
            p.classList.toggle('active', (idx + 1) === selectedDay);
        });
        document.getElementById('listTitle').innerText = `${selectedDay} ${selectedMonth} ${selectedYear} - TASKS`;
        renderHabits();
        loadNote();
        updateChart();
        calculateAchievements();
        localStorage.setItem('HabitPro_Daily_Mode', JSON.stringify(allData));
    }

    function renderHabits() {
        const list = document.getElementById('habitList');
        list.innerHTML = '';
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        habits.forEach((h, idx) => {
            const row = document.createElement('div');
            row.className = `habit-row`;
            row.innerHTML = `
                <div class="habit-label row-${idx % 5}">
                    <div class="task-content">
                        <span>${h.text}</span>
                        <span class="task-time">(${h.time || '--:--'})</span>
                    </div>
                    <span class="delete-btn" onclick="deleteHabit(${idx})">×</span>
                </div>
                <div class="habit-check-area">
                    <div class="custom-checkbox ${h.done ? 'checked' : ''}" onclick="toggleHabit(${idx})"></div>
                </div>`;
            list.appendChild(row);
        });
    }

    function addHabit() {
        const input = document.getElementById('habitInput');
        if(!input.value.trim()) return;
        
        const now = new Date();
        const timeStr = now.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
        
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        if(!allData[key]) allData[key] = [];
        allData[key].push({ 
            text: input.value, 
            done: false,
            time: timeStr
        });
        input.value = '';
        updateUI();
    }

    function toggleHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key][idx].done = !allData[key][idx].done;
        if(allData[key][idx].done) confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
        updateUI();
    }

    function deleteHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key].splice(idx, 1);
        updateUI();
    }

    function saveNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        notesData[key] = document.getElementById('dayNote').value;
        localStorage.setItem('HabitPro_Notes_Daily', JSON.stringify(notesData));
    }

    function loadNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        document.getElementById('dayNote').value = notesData[key] || '';
    }

    function initChart() {
        const ctx = document.getElementById('habitChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                data: [], 
                borderColor: '#7E9CC7', 
                backgroundColor: 'rgba(126, 156, 199, 0.2)', 
                fill: true, 
                tension: 0.4,
                pointRadius: 2
            }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, max: 100, ticks: { font: { size: 8 } } },
                    x: { grid: { display: false }, ticks: { font: { size: 8 } } }
                }
            }
        });
    }

    function updateChart() {
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let labels = []; let scores = [];
        for(let i=1; i<=daysInMonth; i++) {
            labels.push(i);
            const habits = allData[`${selectedYear}_${selectedMonth}_${i}`] || [];
            const done = habits.filter(h => h.done).length;
            scores.push(habits.length ? Math.round((done/habits.length)*100) : 0);
        }
        myChart.data.labels = labels;
        myChart.data.datasets[0].data = scores;
        myChart.update();
    }

    function openExport() {
        const data = { allData, notesData };
        document.getElementById('modalTitle').innerText = "Backup Code";
        document.getElementById('dataArea').value = btoa(JSON.stringify(data));
        document.getElementById('modalBtn').innerText = "Copy";
        document.getElementById('dataModal').style.display = 'flex';
    }
    function openRestore() {
        document.getElementById('modalTitle').innerText = "Restore Data";
        document.getElementById('dataArea').value = "";
        document.getElementById('modalBtn').innerText = "Restore";
        document.getElementById('dataModal').style.display = 'flex';
    }
    function processData() {
        if(document.getElementById('modalBtn').innerText === "Copy") {
            navigator.clipboard.writeText(document.getElementById('dataArea').value);
            alert("Copied!");
        } else {
            try {
                const data = JSON.parse(atob(document.getElementById('dataArea').value));
                allData = data.allData; notesData = data.notesData;
                updateUI(); alert("Success!"); closeModal();
            } catch(e) { alert("Invalid Code!"); }
        }
    }
    function closeModal() { document.getElementById('dataModal').style.display = 'none'; }
</script>
</body>
</html>
