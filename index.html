<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinobi Mission Log 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --naruto-orange: #FF9100;
            --naruto-blue: #1C244B;
            --naruto-red: #BE0000;
            --scroll-bg: #F2E3C9;
            --text-dark: #2D2424;
            --leaf-symbol: #000000;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--naruto-orange);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            text-align: center;
            animation: spin 2s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .splash-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            color: var(--naruto-blue);
            margin-top: 20px;
        }

        .fade-out { opacity: 0; pointer-events: none; }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--naruto-blue); 
            margin: 0; 
            padding: 10px; 
            color: var(--text-dark);
            background-image: radial-gradient(var(--naruto-orange) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* --- MISSION CARDS --- */
        .card { 
            background: var(--scroll-bg); 
            border-radius: 8px; 
            padding: 15px; 
            border: 2px solid var(--text-dark);
            box-shadow: 6px 6px 0px var(--naruto-orange);
        }

        .achievement-container { 
            background: #FFFFFF; 
            border-radius: 8px; 
            padding: 15px; 
            border: 3px solid var(--text-dark);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 145, 0, 0.05) 10px, rgba(255, 145, 0, 0.05) 20px);
        }

        .ach-title { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 18px; 
            color: var(--naruto-red);
            margin-bottom: 10px;
            text-align: center;
        }

        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-section { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 4px; text-align: center; border: 1px dashed var(--text-dark); }
        .ach-label { font-size: 10px; font-weight: 900; color: var(--naruto-blue); text-transform: uppercase; }
        .ach-value { font-family: 'Permanent Marker', cursive; font-size: 24px; color: var(--text-dark); margin: 5px 0; }
        
        .medal-badge { 
            font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 20px; background: #CCC; color: #666; 
        }
        .medal-badge.active { background: var(--naruto-red); color: white; border: 1px solid black; }

        /* --- CALENDAR --- */
        .calendar-nav { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; }
        .day-pill { 
            min-width: 50px; padding: 10px 5px; background: var(--scroll-bg); border-radius: 4px; border: 2px solid var(--text-dark);
            cursor: pointer; text-align: center; flex-shrink: 0; transition: 0.2s;
        }
        .day-pill.active { background: var(--naruto-orange) !important; transform: translateY(-3px); }
        .day-pill .date-num { font-weight: 900; font-size: 18px; display: block; }

        /* --- HABIT LIST --- */
        .habit-container { border-radius: 8px; overflow: hidden; background: var(--scroll-bg); border: 2px solid var(--text-dark); }
        .habit-header { 
            background: var(--naruto-orange); 
            padding: 12px; 
            font-family: 'Permanent Marker', cursive; 
            font-size: 18px; 
            color: var(--naruto-blue);
            border-bottom: 2px solid var(--text-dark);
        }
        
        .habit-row { 
            display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); 
            min-height: 60px; 
        }
        .habit-label { flex: 1; padding: 10px 15px; font-weight: 900; }
        .task-time { font-size: 10px; color: var(--naruto-red); font-weight: 400; }

        .habit-check-area { width: 60px; display: flex; align-items: center; justify-content: center; }
        .custom-checkbox { 
            width: 30px; height: 30px; border: 3px solid var(--text-dark); border-radius: 50%; 
            background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .custom-checkbox.checked { background: var(--naruto-blue); border-color: var(--naruto-blue); }
        .custom-checkbox.checked::after { content: '🍥'; color: white; font-size: 16px; }

        .delete-btn { color: var(--naruto-red); font-weight: bold; font-size: 20px; cursor: pointer; padding: 0 10px; }

        /* --- INPUTS --- */
        .input-group { display: flex; gap: 8px; }
        .input-group input { 
            flex: 1; background: var(--scroll-bg); border: 2px solid var(--text-dark); border-radius: 4px; 
            padding: 12px; color: var(--text-dark); font-weight: bold; outline: none;
        }
        .input-group button { 
            background: var(--naruto-red); color: white; border: 2px solid var(--text-dark); padding: 0 20px; 
            border-radius: 4px; font-family: 'Permanent Marker', cursive; cursor: pointer;
        }

        #dayNote { 
            background: var(--scroll-bg); border: 2px solid var(--text-dark); border-radius: 4px; 
            padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box;
        }

        .history-toggle-btn { 
            width: 100%; padding: 15px; border-radius: 4px; border: 2px solid var(--text-dark);
            background: var(--naruto-orange); color: var(--naruto-blue); font-family: 'Permanent Marker', cursive; 
            font-size: 16px; cursor: pointer;
        }

        .dev-sig { text-align: center; font-family: 'Permanent Marker', cursive; color: var(--naruto-orange); margin: 20px 0; letter-spacing: 2px; }

        select { 
            background: var(--scroll-bg); border: 2px solid var(--text-dark); font-weight: bold; border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="#1C244B">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" />
        </svg>
    </div>
    <div class="splash-text">MISSION START!</div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 5px;">
        <h3 style="margin:0; font-family:'Permanent Marker', cursive; color:white;">MISSION LOG</h3>
        <div style="display: flex; gap: 5px;">
            <select id="monthSelect" onchange="initCalendar()">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
            <select id="yearSelect" onchange="initCalendar()"></select>
        </div>
    </div>

    <div class="achievement-container">
        <div class="ach-title">Shinobi Rank</div>
        <div class="ach-grid">
            <div class="ach-section">
                <div class="ach-label">Chakra Level</div>
                <div id="dailyPercentText" class="ach-value">0%</div>
                <div id="dailyMedal" class="medal-badge">ACADEMY</div>
            </div>
            <div class="ach-section">
                <div class="ach-label">Village Contribution</div>
                <div id="monthlyPercentText" class="ach-value">0%</div>
                <div id="monthlyMedal" class="medal-badge">GENIN</div>
            </div>
        </div>
    </div>

    <div class="calendar-nav" id="datePicker"></div>

    <div class="card">
        <canvas id="habitChart" height="150"></canvas>
    </div>

    <div class="habit-container">
        <div class="habit-header" id="listTitle">D-RANK MISSIONS</div>
        <div id="habitList"></div>
    </div>

    <div class="input-group">
        <input type="text" id="habitInput" placeholder="New mission description...">
        <button onclick="addHabit()">ADD</button>
    </div>

    <div class="card">
        <div style="font-weight:900; margin-bottom:5px; color:var(--naruto-red);">SHINOBI JOURNAL</div>
        <textarea id="dayNote" style="min-height: 60px;" placeholder="Record your training notes..." oninput="saveNote()"></textarea>
    </div>

    <div id="historyBox" style="max-height:0; overflow:hidden; transition: 0.5s;">
        <div class="card" id="historyList"></div>
    </div>

    <button class="history-toggle-btn" onclick="toggleHistory()">VIEW MISSION HISTORY</button>

    <div class="dev-sig">DATTEBAYO! • PRITAMXII</div>
</div>

<script>
    // CORE LOGIC 
    let allData = JSON.parse(localStorage.getItem('HabitPro_Daily_Mode')) || {};
    let notesData = JSON.parse(localStorage.getItem('HabitPro_Notes_Daily')) || {};
    
    const todayObj = new Date();
    const realToday = todayObj.getDate();
    const realMonth = todayObj.getMonth();
    const realYear = todayObj.getFullYear();
    
    let selectedDay = realToday;
    let selectedMonth = "";
    let selectedYear = realYear;
    
    const monthsArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    let myChart;

    window.onload = function() {
        const yearSelect = document.getElementById('yearSelect');
        for(let y = realYear - 2; y <= realYear + 5; y++) {
            let opt = document.createElement('option');
            opt.value = y;
            opt.innerHTML = y;
            if(y === realYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        selectedMonth = monthsArr[realMonth];
        document.getElementById('monthSelect').value = selectedMonth;
        initChart();
        initCalendar();

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
        }, 1200);

        // Update Check Trigger
        setTimeout(checkForUpdates, 3000);
    };

    function initCalendar() {
        selectedMonth = document.getElementById('monthSelect').value;
        selectedYear = parseInt(document.getElementById('yearSelect').value);
        const picker = document.getElementById('datePicker');
        picker.innerHTML = '';
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
            const dateObj = new Date(selectedYear, monthsArr.indexOf(selectedMonth), i);
            const pill = document.createElement('div');
            pill.className = `day-pill ${i === selectedDay ? 'active' : ''}`;
            pill.innerHTML = `<span style="font-size:9px; font-weight:900;">${dayNames[dateObj.getDay()]}</span><span class="date-num">${i}</span>`;
            pill.onclick = () => { selectedDay = i; updateUI(); };
            picker.appendChild(pill);
        }
        updateUI();
    }

    function toggleHistory() {
        const box = document.getElementById('historyBox');
        box.style.maxHeight = box.style.maxHeight === '0px' || !box.style.maxHeight ? '500px' : '0px';
    }

    function updateUI() {
        document.querySelectorAll('.day-pill').forEach((p, idx) => {
            p.classList.toggle('active', (idx + 1) === selectedDay);
        });
        document.getElementById('listTitle').innerText = `${selectedDay} ${selectedMonth.toUpperCase()} MISSIONS`;
        renderHabits();
        loadNote();
        updateChart();
        calculateAchievements();
        localStorage.setItem('HabitPro_Daily_Mode', JSON.stringify(allData));
    }

    function renderHabits() {
        const list = document.getElementById('habitList');
        list.innerHTML = '';
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        habits.forEach((h, idx) => {
            const row = document.createElement('div');
            row.className = `habit-row`;
            row.innerHTML = `
                <div class="habit-label">
                    <span style="${h.done ? 'text-decoration:line-through; opacity:0.5;' : ''}">${h.text}</span>
                    <div class="task-time">MISSION START: ${h.time || '--:--'}</div>
                </div>
                <span class="delete-btn" onclick="deleteHabit(${idx})">×</span>
                <div class="habit-check-area">
                    <div class="custom-checkbox ${h.done ? 'checked' : ''}" onclick="toggleHabit(${idx})"></div>
                </div>`;
            list.appendChild(row);
        });
    }

    function addHabit() {
        const input = document.getElementById('habitInput');
        if(!input.value.trim()) return;
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        if(!allData[key]) allData[key] = [];
        allData[key].push({ text: input.value, done: false, time: timeStr });
        input.value = ''; updateUI();
    }

    function toggleHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key][idx].done = !allData[key][idx].done;
        if(allData[key][idx].done) {
            confetti({ particleCount: 40, spread: 60, colors: ['#FF9100', '#1C244B'] });
        }
        updateUI();
    }

    function deleteHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key].splice(idx, 1);
        updateUI();
    }

    function calculateAchievements() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        const doneCount = habits.filter(h => h.done).length;
        const dailyPercent = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
        document.getElementById('dailyPercentText').innerText = dailyPercent + "%";
        
        let dailyMedal = "ACADEMY";
        if(dailyPercent >= 90) dailyMedal = "HOKAGE";
        else if(dailyPercent >= 70) dailyMedal = "JONIN";
        else if(dailyPercent >= 40) dailyMedal = "CHUNIN";
        
        const dBadge = document.getElementById('dailyMedal');
        dBadge.innerText = dailyMedal;
        dBadge.className = dailyPercent >= 40 ? 'medal-badge active' : 'medal-badge';
    }

    function saveNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        notesData[key] = document.getElementById('dayNote').value;
        localStorage.setItem('HabitPro_Notes_Daily', JSON.stringify(notesData));
    }

    function loadNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        document.getElementById('dayNote').value = notesData[key] || '';
    }

    function initChart() {
        const ctx = document.getElementById('habitChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                label: 'Chakra', data: [], borderColor: '#FF9100', backgroundColor: 'rgba(255, 145, 0, 0.2)', fill: true, tension: 0.4
            }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    }

    function updateChart() {
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let labels = []; let scores = [];
        for(let i=1; i<=daysInMonth; i++) {
            labels.push(i);
            const habits = allData[`${selectedYear}_${selectedMonth}_${i}`] || [];
            const done = habits.filter(h => h.done).length;
            scores.push(habits.length ? Math.round((done/habits.length)*100) : 0);
        }
        myChart.data.labels = labels;
        myChart.data.datasets[0].data = scores;
        myChart.update();
    }

    // --- UPDATE SYSTEM LOGIC ---
    const APP_VERSION = "1.0.0"; 
    const UPDATE_CONFIG_URL = "https://raw.githubusercontent.com/pritamxii/DailyTask/main/version.json";

    async function checkForUpdates() {
        try {
            const response = await fetch(UPDATE_CONFIG_URL);
            const data = await response.json();
            if (data.version !== APP_VERSION) {
                showUpdateModal(data.version, data.url);
            }
        } catch (err) {
            console.log("Update check failed.");
        }
    }

    function showUpdateModal(newVersion, downloadUrl) {
        const modal = document.createElement('div');
        modal.id = "update-popup";
        modal.innerHTML = `
            <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif;">
                <div style="background: #fff; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                    <div style="font-size: 50px; margin-bottom: 10px;">🚀</div>
                    <h2 style="margin: 0; color: #222; font-size: 22px;">Update Available!</h2>
                    <p style="color: #666; font-size: 14px; margin: 15px 0;">New mission updates are ready (${newVersion}).</p>
                    <button onclick="window.location.href='${downloadUrl}'" style="background: #FF9100; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px;">Update Now</button>
                    <p style="margin-top: 15px; font-size: 12px; color: #aaa; cursor: pointer;" onclick="document.getElementById('update-popup').remove()">Not Now</p>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
</script>
</body>
</html>
